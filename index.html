<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>FORGOTTEN</title>
</head>
<body>
    <main class="page">
        <h1>FORGOTTEN SPECIES 2050</h1>
        <p class="subtitle">Click the folder to open the case file.</p>

        <button id="folderButton" class="folder-wrap">
            <img src="/assets/folder.svg" class="folder-image">
            <span class="folder-label">Open Evidence Folder</span>
        </button>

        <section id="caseBoard" class="hidden board">
            <aside class="left-panel">
                <h2>Evidence</h2>
                <button class="tab active" data-panel="specimen">Specimen</button>
                <button class="tab" data-panel="photos">Photos</button>
                <button class="tab" data-panel="adaptation">Adaptation</button>
                <button class="tab" data-panel="notes">Notes</button>
            </aside>

            <section class="right-panel">
                <article class="paper show" data-panel="specimen">
                    <p class="stamp">Recovered Profile</p>
                    <h3>Bla bla bla scientfic name</h3>
                    <p>ahhh description</p>
                    <p>features random</p>
                </article>
                <article class="paper" data-panel="photos">
                    <p class="stamp">Photos</p>
                    <h3>Photos</h3>
                    <div class="photos">
                        <button class="photo" data-photo="1">random text</button>
                    </div>
                    <p id="photoText" class="photos-text">click a photo</p>
                </article>
            </section>
        </section>
    </main>
</body>
</html>
